#   description: "{verb} on {resource}/{name} (ns:{namespace}) by {actor}"
#   severity: high                  # high | medium | low
#   workflow: deploy                # deploy | incident | debug | rollback | release
#   ignore_system: true             # true = skip k8s controllers
#   match:
#     resource: pods                # single resource (or use resources: list)
#     subresource: exec             # omit if not needed
#     verb: get                     # single verb (or use verbs: list)
#     # annotation: "key=value"     # uncomment if annotation match needed
#     # namespace_contains: prod    # uncomment to scope to specific namespace
#     # ignore_namespaces:          # uncomment to exclude specific namespaces
